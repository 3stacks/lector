# Docker Registry - run this on your server
# Place at: /opt/registry/docker-compose.yml
#
# Start with: docker compose up -d

services:
  registry:
    image: registry:2
    container_name: docker-registry
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry
    environment:
      # Optional: enable deletion of images
      REGISTRY_STORAGE_DELETE_ENABLED: "true"

volumes:
  registry-data:
